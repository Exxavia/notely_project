{% extends "base.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="container mt-4">

    <!-- Header -->
    <div class="text-center mb-4">
        <h2>Dashboard</h2>
        <p class="text-muted">Interactive task analytics</p >
    </div>

    <!-- Summary -->
    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <h6>Total Tasks</h6>
                <h3 id="total-count">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <h6>Completed</h6>
                <h3 id="done-count">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <h6>Overdue</h6>
                <h3 id="overdue-count">0</h3>
            </div>
        </div>
    </div>

    <!-- Buttons -->
    <div class="text-center mb-3">
        <button class="btn btn-outline-primary chart-btn active" data-type="status">Status</button>
        <button class="btn btn-outline-secondary chart-btn" data-type="priority">Priority</button>
        <button class="btn btn-outline-danger chart-btn" data-type="overdue">Overdue</button>
    </div>

    <!-- Insight -->
    <div class="text-center mt-3">
        <p id="insight-text" class="fw-bold text-primary"></p >
    </div>

    <!-- Chart -->
    

    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <div style="position: relative; height: 350px;">
                    <canvas id="taskChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h5 class="text-center">Filtered Tasks</h5>
                <div id="loading" class="text-center text-muted" style="display:none;">
                    Loading...
                </div>
                <ul id="task-list" class="list-group mt-3" style="max-height: 300px; overflow-y: auto;"></ul>
                    
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let chart = null;

/* Initialize chart */
function initChart(labels, values) {

    const ctx = document.getElementById("taskChart");

    chart = new Chart(ctx, {
        type: "doughnut",
        data: {
            labels: labels,
            datasets: [{
                data: values
            }]
        },
        options: {

            /* 🔥 CHANGED: no redirect anymore */
            onClick: function(e, elements) {

                if (!elements.length) return;

                const index = elements[0].index;
                const label = chart.data.labels[index].toLowerCase();

                loadFilteredTasks(label);
            }
        }
    });
}


/* Load chart */
function loadChart(type) {

    fetch(`/chart/${type}/`)
    .then(res => res.json())
    .then(data => {

        if (chart) {
            chart.data.labels = data.labels;
            chart.data.datasets[0].data = data.values;
            chart.update();
        } else {
            initChart(data.labels, data.values);
        }

        const total = data.values.reduce((a, b) => a + b, 0);
        document.getElementById("total-count").innerText = total;

        if (type === "status") {

            document.getElementById("done-count").innerText = data.values[2] || 0;

            const percent = total ? Math.round((data.values[2] / total) * 100) : 0;

            document.getElementById("insight-text").innerText =
                `You have completed ${percent}% of your tasks`;
        }

        if (type === "overdue") {

            document.getElementById("overdue-count").innerText = data.values[0] || 0;

            document.getElementById("insight-text").innerText =
                `${data.values[0]} tasks are overdue`;
        }

        if (type === "priority") {

            document.getElementById("insight-text").innerText =
                "Task distribution by priority";
        }

    });
}


/* 🔥 NEW FUNCTION */
function loadFilteredTasks(type) {

    const list = document.getElementById("task-list");
    const loading = document.getElementById("loading");

    list.innerHTML = "";
    loading.style.display = "block";

    fetch(`/tasks/api/?type=${type}`)
    .then(res => res.json())
    .then(data => {

        loading.style.display = "none";

        if (!data.tasks.length) {
            list.innerHTML = `
                <li class="list-group-item text-muted text-center">
                    No tasks found
                </li>
            `;
            return;
        }

        data.tasks.forEach(task => {

            const li = document.createElement("li");

            li.className = "list-group-item d-flex justify-content-between align-items-center";

            li.innerHTML = `
                <a href="/task/${task.id}/"class="text-decoration-none flex-grow-1">
                    <span>${task.title}</span>
                    <br>
                    <small class="text-muted">Project: ${task.project}</small>
                </a>
                <span class="badge bg-${getColor(task.status)}">
                    ${task.status}
                </span>
            `;

            list.appendChild(li);
        });

    });
}


/* Status color */
function getColor(status) {

    if (status === "todo") return "secondary";
    if (status === "doing") return "warning";
    if (status === "done") return "success";

    return "dark";
}


/* Button switch */
document.querySelectorAll('.chart-btn').forEach(btn => {

    btn.addEventListener('click', function() {

        document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove("active"));
        this.classList.add("active");

        loadChart(this.dataset.type);
    });

});


/* Initial load */
document.addEventListener("DOMContentLoaded", function () {
    loadChart("status");
});

</script>

{% endblock %}
