{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow border-0">

<div class="card-body p-4">

<h3 class="text-center mb-4">Login to Notely</h3>

<!-- Display messages -->
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-warning">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<!-- Username -->
<div class="mb-3">

<label class="form-label">Username</label>

<input type="text"
       name="username"
       class="form-control"
       placeholder="Enter your username"
       required>

</div>

<!-- Password -->
<div class="mb-3">

<label class="form-label">Password</label>

<input type="password"
       name="password"
       class="form-control"
       placeholder="Enter your password"
       required>

</div>

<!-- Login button -->
<button class="btn btn-primary w-100 mb-3">
Login
</button>

</form>

<!-- Reset password -->
<div class="text-center">

<a href="{% url 'password_reset' %}">
Forgot your password?
</a>

</div>

<hr>

<!-- Register -->
<div class="text-center">

Don't have an account?

<a href="{% url 'register' %}">
Register here
</a>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
